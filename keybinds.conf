$mod = SUPER

########################

# 🧭 BASIC NAVIGATION

########################

# Window control

bind = $mod, W, killactive
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1
bind = $mod, T, togglefloating
bind = $mod, P, pseudo

# Focus movement (vim-style + arrows)

bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Swap windows

bind = $mod SHIFT, H, swapwindow, l
bind = $mod SHIFT, L, swapwindow, r
bind = $mod SHIFT, K, swapwindow, u
bind = $mod SHIFT, J, swapwindow, d

########################

# 🖥️ WORKSPACES

########################

# Switch

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
# Move window

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9


# Cycle

bind = $mod, Tab, workspace, e+1
bind = $mod SHIFT, Tab, workspace, e-1

########################

# 📐 LAYOUT / SIZE

########################

# Resize active window

bind = $mod, equal, resizeactive, 50 0
bind = $mod, minus, resizeactive, -50 0
bind = $mod SHIFT, equal, resizeactive, 0 50
bind = $mod SHIFT, minus, resizeactive, 0 -50

# Layout toggle (no conflict now)

bind = $mod, Y, exec, hyprctl keyword general:layout dwindle
bind = $mod SHIFT, Y, exec, hyprctl keyword general:layout master

########################

# 🚀 APPLICATIONS

########################

# Core apps

bind = $mod, Return, exec, ghostty
bind = $mod SHIFT, Return, exec, brave
bind = $mod, E, exec, thunar

# Launcher

# Walker
bind = $mod, SPACE, exec, walker

########################

# 🧰 SYSTEM ACTIONS

########################

# Lock

bind = $mod CTRL, L, exec, hyprlock

# Power menu

bind = $mod, Escape, exec, ~/.config/hypr/scripts/power.sh

########################

# 📸 SCREENSHOT

########################

bind = , Print, exec, grim - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy

########################

# 📋 CLIPBOARD

########################

bind = $mod CTRL, V, exec, cliphist list | walker | cliphist decode | wl-copy

########################

# 🔊 MEDIA KEYS

########################

# Volume controls (for YOUR keyboard)
bind = , F12, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , F11, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , F10, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bind = , F3, exec, brightnessctl set 5%-
bind = , F4, exec, brightnessctl set +5%
########################

# 🎯 MISC POWER MOVES

########################

# 🌐 LANGUAGE SWITCH

########################

# Next layout

bind = SHIFT, SPACE, exec, hyprctl switchxkblayout all next

# Previous layout (optional but useful)

bind = $mod SHIFT, SPACE, exec, hyprctl switchxkblayout all prev
